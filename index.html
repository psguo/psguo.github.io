<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | UR5</title>
    <link rel="stylesheet" href="TemplateData/style.css">
    <link rel="shortcut icon" href="TemplateData/favicon.ico" />
    <script src="TemplateData/UnityProgress.js"></script>
    
    <script type="text/javascript" src="lib/jquery/jquery-3.2.1.min.js"></script>
    <script type="text/javascript" src="lib/eventemitter2/eventemitter2.min.js"></script>
    <script type="text/javascript" src="lib/roslibjs/roslib.js"></script>
  </head>
  <body class="template">
    <div class="template-wrap clear">
      <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" height="600px" width="960px"></canvas>
      <br>
      <div class="fullscreen"><img src="TemplateData/fullscreen.png" width="38" height="38" alt="Fullscreen" title="Fullscreen" onclick="SetFullscreen(1);" /></div>
      <div class="title">UR5 Simulation</div>
    </div>
    <div id="statusIndicator">
    <p id="connecting">
      Connecting to rosbridge...
    </p>
    <p id="connected" style="color:#00D600; display:none">
      Connected
    </p>
    <p id="error" style="color:#FF0000; display:none">
      Error in the backend!
    </p>
    <p id="closed" style="display:none">
      Connection closed.
    </p>
  </div>
    <script type='text/javascript'>
      var Module = {
        TOTAL_MEMORY: 268435456,
        errorhandler: null,			// arguments: err, url, line. This function must return 'true' if the error is handled, otherwise 'false'
        compatibilitycheck: null,
        backgroundColor: "#222C36",
        splashStyle: "Light",
        dataUrl: "Release/Builds.data",
        codeUrl: "Release/Builds.js",
        asmUrl: "Release/Builds.asm.js",
        memUrl: "Release/Builds.mem",
      };
    </script>

    <script>
      $(document).ready( function() {

        // Connecting to ROS
        // -----------------
        var ros = new ROSLIB.Ros();

        // If there is an error on the backend, an 'error' emit will be emitted.
        ros.on('error', function(error) {
          document.getElementById('connecting').style.display = 'none';
          document.getElementById('connected').style.display = 'none';
          document.getElementById('closed').style.display = 'none';
          document.getElementById('error').style.display = 'inline';
          console.log(error);
        });

        // Find out exactly when we made a connection.
        ros.on('connection', function() {
          console.log('Connection made!');
          document.getElementById('connecting').style.display = 'none';
          document.getElementById('error').style.display = 'none';
          document.getElementById('closed').style.display = 'none';
          document.getElementById('connected').style.display = 'inline';
        });

        ros.on('close', function() {
          console.log('Connection closed.');
          document.getElementById('connecting').style.display = 'none';
          document.getElementById('connected').style.display = 'none';
          document.getElementById('closed').style.display = 'inline';
        });

        // Create a connection to the rosbridge WebSocket server.
        ros.connect('ws://192.168.1.20:9090');

        //Subscribing to New Topic
        //----------------------

        // Like when publishing a topic, we first create a Topic object with details of the topic's name
        // and message type. Note that we can call publish or subscribe on the same topic object.
        var listener2 = new ROSLIB.Topic({
          ros : ros,
          name : '/move_group/display_planned_path',
          messageType : 'moveit_msgs/DisplayTrajectory'
        });

        var planMessage;
        // Then we add a callback to be called every time a message is published on this topic.
        listener2.subscribe(function(message) {
          console.log('Received message on ' + listener2.name + ': ' + message);
          planMessage = message;

          // If desired, we can unsubscribe from the topic as well.
          listener2.unsubscribe();
        });
      });
      
    </script>

<script src="Release/UnityLoader.js"></script>

  </body>
</html>
